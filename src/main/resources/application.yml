spring:
  profiles:
    active: local
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/employee_management_db}
    username: ${DB_USERNAME:employee_app_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    clean-disabled: false

app:
  file:
    upload-dir: uploads/documents

security:
  jwt:
    secret: ${JWT_SECRET:Y2hhbmdlLW1lLXRoaXMtZGVmYXVsdC1qd3Qtc2VjcmV0LWF0LWxlYXN0LTMyLWJ5dGVzLWxvbmctZm9yLWRldi1vbmx5}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}